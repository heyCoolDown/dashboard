<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@200;300;400;500&family=Outfit:wght@100;200;300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:100vw; height:100vh; overflow:hidden; font-family:'Outfit','Noto Sans KR',sans-serif; color:#fff; background:#111; }

.bg-layer {
  position:fixed; inset:0;
  background-size:cover; background-position:center;
  transition:opacity 2s ease;
}
.bg-layer::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(to bottom,
    rgba(0,0,0,0.52) 0%, rgba(0,0,0,0.15) 35%,
    rgba(0,0,0,0.15) 65%, rgba(0,0,0,0.68) 100%);
}
#bg-a { z-index:1; opacity:1; }
#bg-b { z-index:2; opacity:0; }

#photo-credit {
  position:fixed; bottom:10px; right:16px;
  font-size:0.55rem; font-weight:300;
  color:rgba(255,255,255,0.3); letter-spacing:0.5px;
  z-index:5; text-align:right; line-height:1.7; pointer-events:none;
}

#app {
  position:relative; z-index:3;
  width:100vw; height:100vh;
  display:grid; grid-template-rows:1fr auto;
  padding:38px 46px 34px;
}
.top-row { display:grid; grid-template-columns:1fr auto; align-items:start; gap:32px; }
.bottom-row { display:grid; grid-template-columns:auto 1fr auto; align-items:end; gap:40px; }

.clock { font-family:'Outfit',sans-serif; font-weight:100; font-size:7rem; letter-spacing:-2px; text-shadow:0 2px 24px rgba(0,0,0,0.5); line-height:1; }
.date-line { font-weight:300; font-size:1.05rem; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.7); margin-top:7px; }

.weather-block { text-align:right; padding-top:6px; }
.weather-icon-big { font-size:2.6rem; line-height:1; margin-bottom:4px; }
.weather-temp-big { font-family:'Outfit',sans-serif; font-weight:100; font-size:4.2rem; line-height:1; letter-spacing:-1px; }
.weather-desc { font-weight:300; font-size:0.9rem; color:rgba(255,255,255,0.65); margin-top:5px; letter-spacing:1px; }
.weather-sub { font-weight:300; font-size:0.72rem; color:rgba(255,255,255,0.45); margin-top:7px; line-height:1.9; }

.cal-month-label { font-weight:200; font-size:1.4rem; letter-spacing:4px; text-transform:uppercase; color:rgba(255,255,255,0.45); margin-bottom:13px; }
.cal-grid { display:grid; grid-template-columns:repeat(7,52px); gap:2px; text-align:center; }
.cal-dow { font-size:1.1rem; font-weight:300; color:rgba(255,255,255,0.3); letter-spacing:1px; padding-bottom:7px; }
.cal-dow.sun { color:rgba(255,110,110,0.5); } .cal-dow.sat { color:rgba(100,150,255,0.5); }
.cal-day { font-size:1.4rem; font-weight:300; color:rgba(255,255,255,0.4); border-radius:50%; width:48px; height:48px; display:flex; align-items:center; justify-content:center; margin:auto; }
.cal-day.today { background:rgba(255,255,255,0.88); color:#111; font-weight:500; }
.cal-day.sun { color:rgba(255,110,110,0.6); } .cal-day.sat { color:rgba(100,150,255,0.6); } .cal-day.other { color:rgba(255,255,255,0.15); }

.news-label { font-size:0.58rem; font-weight:300; letter-spacing:4px; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:13px; }
.news-pages { position:relative; }
.news-page { opacity:0; transition:opacity 0.8s ease; pointer-events:none; position:absolute; inset:0; display:flex; flex-direction:column; }
.news-page.active { opacity:1; position:relative; pointer-events:auto; }
.news-item { display:flex; align-items:baseline; gap:13px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.07); }
.news-item:last-child { border-bottom:none; }
.news-idx { font-family:'Outfit',sans-serif; font-weight:100; font-size:1.8rem; color:rgba(255,255,255,0.18); flex-shrink:0; width:32px; text-align:right; }
.news-content { flex:1; min-width:0; }
.news-meta { font-size:1rem; font-weight:300; color:rgba(255,255,255,0.3); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:3px; }
.news-title { font-size:2rem; font-weight:300; color:rgba(255,255,255,0.88); line-height:1.38; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.stocks-label { font-size:0.88rem; font-weight:300; letter-spacing:4px; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:13px; text-align:right; }
.stock-row { display:flex; align-items:baseline; justify-content:flex-end; gap:10px; padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.07); }
.stock-row:last-child { border-bottom:none; }
.stock-name { font-size:1.05rem; font-weight:300; color:rgba(255,255,255,0.38); min-width:100px; text-align:right; }
.stock-price { font-family:'Outfit',sans-serif; font-size:1.5rem; font-weight:300; color:rgba(255,255,255,0.85); min-width:120px; text-align:right; }
.stock-chg { font-size:1.05rem; font-weight:300; min-width:90px; text-align:right; }
.up { color:#7de8b0; } .down { color:#f09090; } .flat { color:rgba(255,255,255,0.3); }

.progress-bar-wrap { position:fixed; bottom:0; left:0; right:0; height:2px; background:rgba(255,255,255,0.07); z-index:10; }
.progress-bar-fill { height:100%; background:rgba(255,255,255,0.25); width:0%; transition:width 0.1s linear; }
.loading-text { color:rgba(255,255,255,0.28); font-size:0.78rem; font-weight:300; letter-spacing:2px; animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.8} }
</style>

<script>
// в”Җв”Җ мң„нӮӨлҜёл””м–ҙ м¶”мІңмӮ¬м§„ (Featured Pictures) лһңлҚӨ 15мһҘ в”Җв”Җ
// л§Өмқј мғҲлЎң к°Җм ёмҳӨкі , лӢ№мқјмқҖ sessionStorageм—җ мәҗмӢң (лҚ°мқҙн„° м Ҳм•Ҫ)

let photos = [];
let bgActive = 'a';
let bgIdx = 0;

function applyBg(idx, fade = true) {
  if (!photos.length) return;
  const photo = photos[idx];
  if (fade) {
    const nextId = bgActive === 'a' ? 'b' : 'a';
    const layerNext = document.getElementById(`bg-${nextId}`);
    const layerCurr = document.getElementById(`bg-${bgActive}`);
    layerNext.style.backgroundImage = `url('${photo.url}')`;
    setTimeout(() => {
      layerNext.style.opacity = '1';
      layerCurr.style.opacity = '0';
      bgActive = nextId;
    }, 500);
  } else {
    document.getElementById(`bg-${bgActive}`).style.backgroundImage = `url('${photo.url}')`;
  }
  document.getElementById('photo-credit').innerHTML =
    `${photo.title}<br>${photo.credit}`;
}

async function fetchFeaturedPhotos() {
  // мҳӨлҠҳ лӮ м§ң нӮӨлЎң мәҗмӢң нҷ•мқё (н•ҳлЈЁ 1нҡҢл§Ң API нҳём¶ң)
  const todayKey = new Date().toISOString().slice(0, 10);
  const cached = sessionStorage.getItem('wm_photos_' + todayKey);
  if (cached) return JSON.parse(cached);

  // лһңлҚӨ мӢңмһ‘ м•ҢнҢҢлІімңјлЎң лӢӨм–‘н•ң мӮ¬м§„ к°Җм ёмҳӨкё°
  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const letter = letters[Math.floor(Math.random() * letters.length)];

  const api = `https://commons.wikimedia.org/w/api.php?action=query` +
    `&generator=categorymembers` +
    `&gcmtitle=Category:Featured_pictures_on_Wikimedia_Commons` +
    `&gcmlimit=50&gcmtype=file` +
    `&gcmstartsortkeyprefix=${letter}` +
    `&prop=imageinfo` +
    `&iiprop=url|extmetadata` +
    `&iiurlwidth=1920` +
    `&format=json&origin=*`;

  const r = await fetch(api);
  const d = await r.json();
  const pages = Object.values(d.query?.pages || {});

  const result = pages
    .filter(p => {
      const url = p.imageinfo?.[0]?.thumburl || '';
      return url.match(/\.(jpg|jpeg|png)/i);
    })
    .map(p => {
      const info = p.imageinfo[0];
      const meta = info.extmetadata || {};
      const rawTitle = meta.ImageDescription?.value || p.title.replace('File:', '').replace(/\.[^.]+$/, '');
      const title = rawTitle.replace(/<[^>]+>/g, '').trim().slice(0, 60);
      const rawCredit = meta.Artist?.value || 'Wikimedia Commons';
      const credit = rawCredit.replace(/<[^>]+>/g, '').trim().slice(0, 50) + ' / CC-BY-SA';
      return { url: info.thumburl, title, credit };
    })
    .sort(() => Math.random() - 0.5)
    .slice(0, 15);

  if (result.length > 0) {
    sessionStorage.setItem('wm_photos_' + todayKey, JSON.stringify(result));
  }
  return result;
}

async function initPhotos() {
  try {
    photos = await fetchFeaturedPhotos();
    if (photos.length > 0) {
      bgIdx = 0;
      applyBg(0, false);
    }
  } catch(e) {
    console.log('мӮ¬м§„ лЎңл“ң мӢӨнҢЁ:', e);
  }
}

initPhotos();

// 5л¶„л§ҲлӢӨ лӢӨмқҢ мӮ¬м§„мңјлЎң м „нҷҳ
setInterval(() => {
  if (!photos.length) return;
  bgIdx = (bgIdx + 1) % photos.length;
  applyBg(bgIdx, true);
}, 5 * 60 * 1000);

// мһҗм •м—җ мғҲ мӮ¬м§„ м„ёнҠё лЎңл“ң
const now = new Date();
const msToMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1) - now;
setTimeout(() => { initPhotos(); setInterval(initPhotos, 24*60*60*1000); }, msToMidnight);


// в”Җв”Җ мӢңкі„ в”Җв”Җ
const DAYS_KO = ['мқјмҡ”мқј','мӣ”мҡ”мқј','нҷ”мҡ”мқј','мҲҳмҡ”мқј','лӘ©мҡ”мқј','кёҲмҡ”мқј','нҶ мҡ”мқј'];
const MONTHS_KO = ['1мӣ”','2мӣ”','3мӣ”','4мӣ”','5мӣ”','6мӣ”','7мӣ”','8мӣ”','9мӣ”','10мӣ”','11мӣ”','12мӣ”'];
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  document.getElementById('dateStr').textContent =
    `${n.getFullYear()}л…„ ${MONTHS_KO[n.getMonth()]} ${n.getDate()}мқј  ${DAYS_KO[n.getDay()]}`;
}
setInterval(updateClock, 1000); updateClock();


// в”Җв”Җ лӢ¬л Ҙ в”Җв”Җ
function buildCalendar() {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth(), today = now.getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const prevDays = new Date(year, month, 0).getDate();
  let h = `<div class="cal-month-label">${MONTHS_KO[month]} ${year}</div><div class="cal-grid">`;
  h += `<div class="cal-dow sun">мқј</div><div class="cal-dow">мӣ”</div><div class="cal-dow">нҷ”</div>
        <div class="cal-dow">мҲҳ</div><div class="cal-dow">лӘ©</div><div class="cal-dow">кёҲ</div>
        <div class="cal-dow sat">нҶ </div>`;
  for (let i=firstDay-1; i>=0; i--) h += `<div class="cal-day other">${prevDays-i}</div>`;
  for (let d=1; d<=daysInMonth; d++) {
    const dow=(firstDay+d-1)%7;
    const cls = d===today?'today':dow===0?'sun':dow===6?'sat':'';
    h += `<div class="cal-day ${cls}">${d}</div>`;
  }
  const rem = 42-(firstDay+daysInMonth);
  for (let d=1; d<=Math.min(rem,7); d++) h += `<div class="cal-day other">${d}</div>`;
  h += '</div>';
  document.getElementById('calendar').innerHTML = h;
}
buildCalendar();


// в”Җв”Җ лӮ м”Ё (OpenWeatherMap) в”Җв”Җ
const OWM_KEY = 'f1807ac533dd55096b84c0425b18d0d4'; // м—¬кё°м—җ API нӮӨ мһ…л Ҙ
const OWM_CITY = 'Busan,KR';

async function loadWeather() {
  try {
    const r = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${OWM_CITY}&appid=${OWM_KEY}&units=metric&lang=kr`);
    const d = await r.json();
    const temp = Math.round(d.main.temp);
    const feels = Math.round(d.main.feels_like);
    const humidity = d.main.humidity;
    const windMs = d.wind.speed;
    const windKmh = Math.round(windMs * 3.6);
    const desc = d.weather[0].description;
    const wid = d.weather[0].id;

    // лӮ м”Ё м•„мқҙмҪҳ л§Өн•‘
    const isNight = d.weather[0].icon?.endsWith('n');
    const icon =
      wid === 800 ? (isNight ? 'рҹҢҷ' : 'вҳҖпёҸ') :
      wid > 800 ? 'вӣ…' :
      wid >= 700 ? 'рҹҢ«пёҸ' :
      wid >= 600 ? 'вқ„пёҸ' :
      wid >= 500 ? 'рҹҢ§пёҸ' :
      wid >= 300 ? 'рҹҢҰпёҸ' :
      wid >= 200 ? 'вӣҲпёҸ' : 'рҹҢӨпёҸ';

    // 3мқј мҳҲліҙ
    const fc = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${OWM_CITY}&appid=${OWM_KEY}&units=metric&lang=kr&cnt=24`);
    const fd = await fc.json();

    // н•ҳлЈЁм№ҳ лҢҖн‘ңк°’ м¶”м¶ң (3к°ң)
    const days = {};
    fd.list.forEach(item => {
      const date = item.dt_txt.slice(0, 10);
      if (!days[date]) days[date] = {min: 999, max: -999};
      days[date].min = Math.min(days[date].min, item.main.temp_min);
      days[date].max = Math.max(days[date].max, item.main.temp_max);
    });
    const fcStr = Object.entries(days).slice(1, 4).map(([date, v]) => {
      const d = new Date(date);
      return `${d.getMonth()+1}/${d.getDate()} ${Math.round(v.min)}В°~${Math.round(v.max)}В°`;
    }).join('  ');

    document.getElementById('weather-block').innerHTML = `
      <div class="weather-icon-big">${icon}</div>
      <div class="weather-temp-big">${temp}В°</div>
      <div class="weather-desc">${desc} В· л¶ҖмӮ°</div>
      <div class="weather-sub">мІҙк°җ ${feels}В° В· мҠөлҸ„ ${humidity}% В· л°”лһҢ ${windKmh}km/h<br>${fcStr}</div>`;
  } catch(e) {
    document.getElementById('weather-block').innerHTML = '<div class="loading-text">лӮ м”Ё м—ҶмқҢ</div>';
  }
}
loadWeather(); setInterval(loadWeather, 10*60*1000);


// в”Җв”Җ мЈјк°Җ в”Җв”Җ
const STOCKS = [
  {sym:'%5EKS11',name:'KOSPI'},{sym:'%5EKQ11',name:'KOSDAQ'},
  {sym:'KRW=X',name:'USD/KRW'},{sym:'%5EGSPC',name:'S&P500'},
  {sym:'%5EIXIC',name:'NASDAQ'},{sym:'GC=F',name:'Gold'},
];
async function fetchViaProxy(targetUrl) {
  const proxies = [
    async u => { const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,{signal:AbortSignal.timeout(8000)}); return (await r.json()).contents; },
    async u => { const r=await fetch(`https://corsproxy.io/?${encodeURIComponent(u)}`,{signal:AbortSignal.timeout(8000)}); if(!r.ok) throw new Error(r.status); return await r.text(); },
  ];
  for (const proxy of proxies) {
    try { const t=await proxy(targetUrl); if(t) return t; } catch(e) { console.warn('н”„лЎқмӢң мӢӨнҢЁ:',e.message); }
  }
  throw new Error('лӘЁл“  н”„лЎқмӢң мӢӨнҢЁ');
}
async function fetchQ(sym) {
  for (const host of ['query1','query2']) {
    try {
      const url=`https://${host}.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`;
      const m=JSON.parse(await fetchViaProxy(url)).chart.result[0].meta;
      return {price:m.regularMarketPrice, prev:m.chartPreviousClose};
    } catch(e) { console.warn(`Yahoo ${host} мӢӨнҢЁ (${sym}):`,e.message); }
  }
  throw new Error(`${sym} лҚ°мқҙн„° м—ҶмқҢ`);
}
function fmt(n){return n==null||isNaN(n)?'вҖ”':n.toLocaleString('ko-KR',{minimumFractionDigits:2,maximumFractionDigits:2});}
const lastStockData={};
async function loadStocks(){
  const results=await Promise.allSettled(STOCKS.map(s=>fetchQ(s.sym)));
  let h='', anySuccess=false;
  results.forEach((r,i)=>{
    const s=STOCKS[i];
    if(r.status==='fulfilled'){lastStockData[s.sym]=r.value; anySuccess=true;}
    const data=lastStockData[s.sym];
    if(data){
      const {price,prev}=data, chg=price-prev, pct=chg/prev*100;
      const dir=chg>0?'up':chg<0?'down':'flat', arrow=chg>0?'в–І':chg<0?'в–ј':'вҖ”';
      h+=`<div class="stock-row"><span class="stock-name">${s.name}</span><span class="stock-price">${fmt(price)}</span><span class="stock-chg ${dir}">${arrow} ${Math.abs(pct).toFixed(2)}%</span></div>`;
    } else {
      h+=`<div class="stock-row"><span class="stock-name">${s.name}</span><span class="stock-price" style="color:rgba(255,255,255,.2)">вҖ”</span></div>`;
    }
  });
  document.getElementById('stocks-list').innerHTML=h;
  if(!anySuccess) setTimeout(loadStocks, 30*1000);
}
loadStocks(); setInterval(loadStocks, 3*60*1000);


// в”Җв”Җ лүҙмҠӨ в”Җв”Җ
const PAGE_SIZE=4, NEWS_INTERVAL=60000;
let allNews=[], currentPage=0, progressTimer=null, pageTimer=null;
const FEEDS=[
  {url:'https://www.yonhapnewstv.co.kr/browse/feed/', src:'м—°н•©лүҙмҠӨ'},
  {url:'https://rss.donga.com/total.xml', src:'лҸҷм•„мқјліҙ'},
  {url:'https://www.hankyung.com/feed/all-news', src:'н•ңкөӯкІҪм ң'},
  {url:'https://www.khan.co.kr/rss/rssdata/total_news.xml', src:'кІҪн–ҘмӢ л¬ё'},
  {url:'https://rss.etnews.com/Section901.xml', src:'м „мһҗмӢ л¬ё'},
];
function timeAgo(ds){
  const diff=(Date.now()-new Date(ds))/60000;
  if(diff<1)return 'л°©кёҲ'; if(diff<60)return `${Math.floor(diff)}л¶„ м „`;
  if(diff<1440)return `${Math.floor(diff/60)}мӢңк°„ м „`; return `${Math.floor(diff/1440)}мқј м „`;
}
async function fetchRSS(feed){
  const text=await fetchViaProxy(feed.url);
  const xml=new DOMParser().parseFromString(text,'text/xml');
  return [...xml.querySelectorAll('item')].slice(0,12).map(el=>({
    title:(el.querySelector('title')?.textContent||'').replace(/<!\[CDATA\[|\]\]>/g,'').replace(/<[^>]+>/g,'').trim(),
    pubDate:el.querySelector('pubDate')?.textContent?.trim()||'', src:feed.src
  })).filter(it=>it.title.length>4);
}
async function loadNews(){
  const items=[];
  await Promise.allSettled(FEEDS.map(async f=>{try{items.push(...await fetchRSS(f));}catch(e){console.warn(`лүҙмҠӨ н”јл“ң мӢӨнҢЁ (${f.src}):`,e.message);}}));
  if(!items.length){if(!allNews.length) setTimeout(loadNews, 30*1000); return;}
  const seen=new Set();
  allNews=items.filter(i=>{if(seen.has(i.title))return false;seen.add(i.title);return true;})
    .sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));
  currentPage=0; renderNews(); startAutoPage();
}
function renderNews(){
  const c=document.getElementById('news-pages');
  const total=Math.ceil(allNews.length/PAGE_SIZE);
  c.innerHTML='';
  for(let p=0;p<total;p++){
    const pg=document.createElement('div');
    pg.className='news-page'+(p===0?' active':'');
    allNews.slice(p*PAGE_SIZE,(p+1)*PAGE_SIZE).forEach((item,idx)=>{
      const el=document.createElement('div'); el.className='news-item';
      el.innerHTML=`<div class="news-idx">${p*PAGE_SIZE+idx+1}</div>
        <div class="news-content">
          <div class="news-meta">${item.src} В· ${timeAgo(item.pubDate)}</div>
          <div class="news-title">${item.title}</div>
        </div>`;
      pg.appendChild(el);
    });
    c.appendChild(pg);
  }
}
function showPage(idx){
  const pages=document.querySelectorAll('.news-page'); if(!pages.length)return;
  pages[currentPage]?.classList.remove('active');
  currentPage=((idx%pages.length)+pages.length)%pages.length;
  pages.forEach((p,i)=>{
    if(i===currentPage){p.style.position='relative';p.classList.add('active');}
    else{p.style.position='absolute';p.classList.remove('active');}
  });
}
function startAutoPage(){
  if(progressTimer)clearInterval(progressTimer); if(pageTimer)clearInterval(pageTimer);
  const fill=document.getElementById('progress-fill');
  let elapsed=0;
  fill.style.width='0%';
  progressTimer=setInterval(()=>{elapsed+=100;fill.style.width=Math.min(elapsed/NEWS_INTERVAL*100,100)+'%';},100);
  pageTimer=setInterval(()=>{elapsed=0;fill.style.width='0%';showPage(currentPage+1);},NEWS_INTERVAL);
}
loadNews(); setInterval(loadNews, 5*60*1000);
</script>
